name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # OIDC for npm trusted publishing — no token stored anywhere
  contents: write # gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      # Do NOT set registry-url on setup-node: it writes an .npmrc with a
      # placeholder ${NODE_AUTH_TOKEN}, and npm then uses that empty token
      # instead of doing the OIDC exchange → 404. No token = OIDC path.
      # OIDC trusted publishing also needs npm >= 11.5.1 (runner ships older).
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - name: Publish to npm (skips if version already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "npcmail@$VERSION" version >/dev/null 2>&1; then
            echo "npcmail@$VERSION already on npm — skipping publish"
          else
            npm publish # prepublishOnly runs typecheck + tests + build
          fi
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
